spring:
    application:
        name: stocks
        version: 1.0.0
    output:
        ansi:
            enabled: always
    
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}



    jpa:
        hibernate:
            ddl-auto: none
    config:
        import: optional:file:../.env[.properties]

    server:
        port: 8080
        error:
            include-stacktrace: never
            include-message: never
    
    logging:
        level:
            root: INFO