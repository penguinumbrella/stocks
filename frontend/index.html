<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Tracker</title>
</head>
<body>

    <form id="new-stock-form" action = "#">
        <input name="ticker-symbol"             placeholder="Ticker (e.g. AAPL)">
        <input name="company-name"              placeholder="Company Name">
        <input name="sector"                    placeholder="Sector">
        <input name="current-market-price"      placeholder="Price"                 type="number"   step="0.01">
        <input name="target-price"              placeholder="Target"                type="number"   step="0.01">
        <input name="analyst-notes"             placeholder="Notes">
        
        <button type="submit">Add Stock</button>
    </form>

    <hr>

    <table>
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Company</th>
                <th>Sector</th>
                <th>Price</th>
                <th>Target</th>
                <th>Date Added</th>
                <th>Notes</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="stock-table-body">
            </tbody>
    </table>

    <script type="module" src="index.js"></script>
</body>
</html>
