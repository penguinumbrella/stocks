<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @layer components {
            /* Field input only */
            .input-field {
                @apply p-3 rounded-xl border 
                bg-slate-900
                
            }

            /* Applies to both search input and field inputs of modal */
            .input {
                @apply border-slate-700  text-slate-100 
                placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent 
                outline-none 
                transition-all duration-300
                hover:border-slate-500;
            }

            /* default header style*/
            .table-header {
                @apply px-6 py-4 text-left font-semibold text-slate-400 uppercase tracking-wider text-xs;
            }
            /* change header to blue when active */
            .table-header.active {
                @apply text-blue-400;
            }

            /* individual table cells */
            .table-cell {
                @apply px-6 py-4 text-slate-300 border-b border-slate-700/50;
            }

            /* edit/delete buttons */
            .btn-base {
                @apply p-1 transition-colors duration-200 flex items-center justify-center;
            }
            .edit-btn {
                @apply btn-base text-slate-500 hover:text-yellow-400;
            }
            .delete-btn {
                @apply btn-base text-slate-500 hover:text-red-400;
            }

            /* Primary buttons (+ new stock, save stock) */
            .primary-btn {
                @apply bg-gradient-to-tr from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700
                text-white
                px-5 py-2.5 rounded-full 
                font-semibold flex items-center gap-2 whitespace-nowrap text-sm
                transition-all active:scale-95;
            }

            /* secondary buttons (cancel, pagination button styles) */
            .secondary-btn {
                @apply px-4 py-2 rounded-full text-sm font-medium border 
                    border-slate-700 bg-slate-800 text-slate-400 
                    transition-all duration-200 
                    hover:bg-slate-700 hover:text-white 
                    disabled:opacity-30 disabled:cursor-not-allowed;
            }

            

        }
    </style>

</head>

<body class="bg-slate-900 text-slate-900">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Portfolio Tracker</h1>

        <!-- Title -->
        <h1 class="text-sm font-semibold tracking-widest text-white uppercase">Stock Management Portfolio</h1>

        <!-- Pie Chart Distribution -->
        <div class=" p-6 px-20 ">
            <canvas id="sector-chart"></canvas>
        </div>

        <!-- New Stock Button + Search Input Line -->
        <div class="flex items-center gap-4 mb-8">

            <!-- NEW STOCK BUTTON -->
            <button id="open-modal-btn" class="
                primary-btn">
                <span>+ NEW STOCK</span>
            </button>

            <!-- SEARCH INPUT -->
            <div class="relative w-full">
                <!-- Magnifying glass icon -->
                <div class="absolute inset-y-0 pl-3 flex items-center pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="grey" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
                </div>
                <!-- text area -->
                <input 
                    id="search-input" 
                    type="text" 
                    placeholder="Search by Ticker, Company, or Sector..." 
                    class="input w-full pl-10 pr-4 py-2.5 
                            text-white
                            bg-slate-800 border 
                            rounded-full"
                >
            </div>
        </div>

        <!-- ADD/EDIT MODAL -->
        <div id="stock-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">

            <!-- Backdrop -->
            <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm"></div>

            <!-- Actual Modal -->
            <div class="relative bg-slate-800 p-8 rounded-2xl shadow-2xl 
                border border-slate-700 
                w-full max-w-2xl 
                transform transition-all">

                <!-- Close Modal X -->
                <button id="close-modal-x" class="absolute top-4 right-4 
                    text-slate-500 hover:text-white 
                    transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

                <!-- Add/edit Modal Title -->
                <h2 class = "text-sm font-semibold tracking-widest text-white mb-6 uppercase" id="modal-title">Add New Stock</h2>
                
                <!-- EDIT/ADD STOCK FORM-->
                <form id="new-stock-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input name="ticker-symbol" class="input-field input" placeholder="Ticker (e.g. AAPL)">
                    <input name="company-name" class="input-field input"  placeholder="Company Name">
                    
                    <!-- SECTOR SELECTION -->
                    <div class=" relative col-span-full md:col-span-1">
                        <select name="sector" class="input-field input w-full appearance-none bg-slate-900 text-slate-100 cursor-pointer">
                            <option value="" disabled selected>Select Sector</option>
                            <option value="Communication Services">Communication Services</option>
                            <option value="Consumer Discretionary">Consumer Discretionary</option>
                            <option value="Consumer Staples">Consumer Staples</option>
                            <option value="Energy">Energy</option>
                            <option value="Financials">Financials</option>
                            <option value="Health Care">Health Care</option>
                            <option value="Industrials">Industrials</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Materials">Materials</option>
                            <option value="Real Estate">Real Estate</option>
                            <option value="Utilities">Utilities</option>
                            </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>

                    <input name="current-market-price" class="input-field input" placeholder="Price" type="number" step="0.01">
                    <input name="target-price" class="input-field input" placeholder="Target" type="number" step="0.01">

                    <textarea 
                        name="analyst-notes" 
                        class="input-field input col-span-full w-full h-32 resize-none" 
                        placeholder="Your notes"
                        rows="4">
                    </textarea>

                    <!-- Close and Save Buttons -->
                    <div class = "flex gap-4">
                        <button type="button" id="close-modal-btn" class="secondary-btn">
                            Cancel
                        </button>
                        <button type="submit" class="primary-btn">
                            Save Stock
                        </button>
                    </div>
                </form>
            </div>
        </div>


        <!-- TABLE -->
        <div class="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 overflow-hidden">
            <table class="w-full text-left text-sm">
            <!-- Headers -->
            <thead class="bg-slate-700/50 border-b border-slate-700">
                    <tr>
                        <th class="table-header cursor-pointer" data-sort="tickerSymbol">Ticker</th>
                        <th class="table-header cursor-pointer" data-sort="companyName">Company</th>
                        <th class="table-header cursor-pointer" data-sort="sector">Sector</th>
                        <th class="table-header cursor-pointer" data-sort="currentMarketPrice">Price</th>
                        <th class="table-header cursor-pointer" data-sort="targetPrice">Target</th>
                        <th class="table-header">Gap</td>
                        <th class="table-header cursor-pointer" data-sort="dateAdded">Date Added</th>
                        <th class="table-header">Notes</th>
                        <th class="table-header text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body">
                    </tbody>
            </table>
        </div>
        
        <!-- PAGINATION CONTROLS -->
        <div id="pagination-controls" 
            class="flex justify-between py-6">
            <!-- Previous Button -->
            <button id="prev-btn" class="secondary-btn flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left-icon lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
                Previous
            </button>
            
            <!-- Page Current Number -->
            <span id="page-info" class="text-sm text-slate-500 font-medium">
                Page 1
            </span>
            
            <!-- Next Button -->
            <button id="next-btn" class="secondary-btn flex items-center gap-2">
                Next
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right-icon lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
        
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
