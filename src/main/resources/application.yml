spring:
    application:
        name: stocks
        version: 1.0.0
    output:
        ansi:
            enabled: always
    
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}

    jpa:
        hibernate:
            ddl-auto: none
    config:
        import: optional:file:.env[.properties]

    server:
        post: 8080
    
    logging:
        level:
            root: INFO