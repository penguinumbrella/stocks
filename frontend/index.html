<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Tracker</title>
    <script src="https://unpkg.com/@heroicons/v2/24/outline/heroicons.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer components {
            .input-field {
                @apply p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none;
            }
            .table-header {
                @apply px-6 py-4 text-left font-semibold text-slate-600 uppercase;
            }
            .table-cell {
                @apply px-6 py-4 bg-red-100;
            }

            .btn-base {
                @apply px-3 py-1 rounded-md text-sm font-medium transition-all duration-200;
            }
            .edit-btn {
                @apply btn-base bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white border border-blue-200;
            }
            .delete-btn {
                @apply btn-base bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border border-red-200;
            }

        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-12 text-slate-900">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-slate-800">Portfolio Tracker</h1>

        <!-- STOCK CREATION/EDIT FORM -->
        <form id="new-stock-form" action="#" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
            <input name="ticker-symbol"             class="input-field" placeholder="Ticker (e.g. AAPL)">
            <input name="company-name"              class="input-field" placeholder="Company Name">
            <input name="sector"                    class="input-field" placeholder="Sector">
            <input name="current-market-price"      class="input-field" placeholder="Price"                 type="number"   step="0.01">
            <input name="target-price"              class="input-field" placeholder="Target"                type="number"   step="0.01">
            <input name="analyst-notes"             class="input-field" placeholder="Notes">
            
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded-lg transition-colors col-span-1 md:col-span-2 lg:col-span-3">Add Stock</button>
        </form>

        <!-- SEARCH INPUT -->
        <div class = "mb-6">
            <input id="search-input" type="text" placeholder="Search by Ticker or Company Name">
        </div>


        <!-- TABLE -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left text-sm">
            <thead class="bg-slate-100">
                    <tr>
                        <th class="table-header cursor-pointer" data-sort="tickerSymbol">Ticker</th>
                        <th class="table-header cursor-pointer" data-sort="companyName">Company</th>
                        <th class="table-header cursor-pointer" data-sort="sector">Sector</th>
                        <th class="table-header cursor-pointer" data-sort="currentMarketPrice">Price</th>
                        <th class="table-header cursor-pointer" data-sort="targetPrice">Target</th>
                        <th class="table-header">Gap</td>
                        <th class="table-header cursor-pointer" data-sort="dateAdded">Date Added</th>
                        <th class="table-header">Notes</th>
                        <th class="table-header text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
        
        <!-- PAGINATION CONTROLS -->
        <div id = "pagination-controls">
            <button id = "prev-btn" disabled>Previous</button>
            <span id = "page-info">Page1</span>
            <button id="next-btn">Next</button>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
